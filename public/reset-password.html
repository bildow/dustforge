<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password — DemiPass</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --bg:#08111a; --card:#132131; --border:#27445f; --text:#e7f1fb; --text2:#9cb4c9; --text3:#6d8397; --accent:#5fb3ff; --green:#69c7b1; --red:#e06c75; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:2rem; max-width:400px; width:100%; }
  h1 { font-size:1.3rem; margin-bottom:0.25rem; } h1 span { color:var(--accent); }
  p { color:var(--text3); font-size:0.85rem; margin-bottom:1.25rem; }
  input { width:100%; padding:0.7rem; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.9rem; margin-bottom:0.5rem; }
  input:focus { outline:none; border-color:var(--accent); }
  button { width:100%; padding:0.7rem; background:var(--accent); border:none; border-radius:8px; color:var(--bg); font-weight:700; cursor:pointer; font-size:0.9rem; }
  .msg { font-size:0.85rem; margin-top:0.75rem; text-align:center; }
  .ok { color:var(--green); } .err { color:var(--red); }
  a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="box">
  <!-- Step 1: Request reset -->
  <div id="step-request">
    <h1>Reset <span>Password</span></h1>
    <p>Enter your username. We'll send a reset link to your @dustforge.com email.</p>
    <input type="text" id="reset-user" placeholder="Username" autofocus>
    <button onclick="requestReset()">Send Reset Link</button>
    <div id="req-msg" class="msg"></div>
    <p style="margin-top:1rem;text-align:center"><a href="https://demipass.com/vault-mobile.html">Back to login</a></p>
  </div>

  <!-- Step 2: Set new password (shown when ?token= is in URL) -->
  <div id="step-reset" style="display:none">
    <h1>New <span>Password</span></h1>
    <p>Set a new password for <strong id="reset-username"></strong></p>
    <input type="password" id="new-pass" placeholder="New password (min 6 chars)">
    <input type="password" id="confirm-pass" placeholder="Confirm password">
    <button onclick="resetPassword()">Reset Password</button>
    <div id="reset-msg" class="msg"></div>
  </div>

  <!-- Step 3: Success -->
  <div id="step-done" style="display:none">
    <h1 style="color:var(--green)">Password Reset</h1>
    <p style="color:var(--text2)">Your password has been updated. You can now log in.</p>
    <a href="https://demipass.com/vault-mobile.html" style="display:block;text-align:center;margin-top:1rem;font-weight:600">Go to Login</a>
  </div>
</div>

<script>
const API = 'https://api.dustforge.com';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (token) {
  document.getElementById('step-request').style.display = 'none';
  document.getElementById('step-reset').style.display = 'block';
  // Verify token
  fetch(API + '/api/identity/reset-password/verify?token=' + token)
    .then(r => r.json())
    .then(d => {
      if (d.valid) {
        document.getElementById('reset-username').textContent = d.username;
      } else {
        document.getElementById('reset-msg').textContent = d.reason === 'expired' ? 'This reset link has expired. Request a new one.' : 'Invalid reset link.';
        document.getElementById('reset-msg').className = 'msg err';
      }
    });
}

async function requestReset() {
  const user = document.getElementById('reset-user').value.trim();
  const msg = document.getElementById('req-msg');
  if (!user) { msg.textContent = 'Enter your username'; msg.className = 'msg err'; return; }
  try {
    const r = await fetch(API + '/api/identity/forgot-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user }),
    });
    const d = await r.json();
    msg.textContent = d.message || 'Check your email.';
    msg.className = 'msg ok';
  } catch (e) { msg.textContent = e.message; msg.className = 'msg err'; }
}

async function resetPassword() {
  const pw = document.getElementById('new-pass').value;
  const confirm = document.getElementById('confirm-pass').value;
  const msg = document.getElementById('reset-msg');
  if (pw.length < 8) { msg.textContent = 'Password must be at least 8 characters'; msg.className = 'msg err'; return; }
  if (pw !== confirm) { msg.textContent = 'Passwords do not match'; msg.className = 'msg err'; return; }
  try {
    const r = await fetch(API + '/api/identity/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: pw }),
    });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('step-reset').style.display = 'none';
      document.getElementById('step-done').style.display = 'block';
    } else { msg.textContent = d.error || 'Reset failed'; msg.className = 'msg err'; }
  } catch (e) { msg.textContent = e.message; msg.className = 'msg err'; }
}
</script>
</body>
</html>
